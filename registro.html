<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiTurnoYa — Registrá tu negocio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f0f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.container { width: 100%; max-width: 420px; }
.logo { text-align: center; margin-bottom: 2rem; }
.logo h1 { font-size: 28px; font-weight: 800; color: #7F77DD; }
.logo p { font-size: 14px; color: #888; margin-top: 4px; }
.card { background: white; border-radius: 16px; padding: 2rem; margin-bottom: 12px; }
.card h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.card p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1.5px solid #eee; border-radius: 10px; overflow: hidden; }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; color: #aaa; background: white; border: none; }
.tab.active { background: #7F77DD; color: white; }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
.form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #eee; border-radius: 10px; font-size: 15px; background: #fafafa; color: #1a1a1a; transition: border-color 0.2s; }
.form-group input:focus { border-color: #7F77DD; outline: none; background: white; }
.btn { width: 100%; padding: 13px; background: #7F77DD; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn:hover { background: #534AB7; }
.btn-google { background: white; color: #333; border: 1.5px solid #eee; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
.btn-google:hover { background: #f5f5f5; }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider span { font-size: 12px; color: #aaa; white-space: nowrap; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
.alert { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; text-align: center; }
.alert-error { background: #FCEBEB; color: #501313; }
.alert-success { background: #EAF3DE; color: #27500A; }
.trial-badge { background: #EEEDFE; border-radius: 10px; padding: 12px; text-align: center; margin-bottom: 1.5rem; }
.trial-badge span { font-size: 13px; color: #534AB7; font-weight: 600; }
.slug-preview { font-size: 12px; color: #7F77DD; margin-top: 4px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>📅 MiTurnoYa</h1>
    <p>El sistema de turnos para tu negocio</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-registro" onclick="showTab('registro')">Registrarme</button>
      <button class="tab" id="tab-login" onclick="showTab('login')">Ingresar</button>
    </div>

    <!-- REGISTRO -->
    <div id="sec-registro">
      <div class="trial-badge">
        <span>🎉 14 días gratis — sin tarjeta de crédito</span>
      </div>
      <div id="alert-registro"></div>
      <div class="form-group">
        <label>Nombre del negocio</label>
        <input type="text" id="reg-nombre" placeholder="Ej: Salón Valentina" oninput="generarSlug()" />
        <div class="slug-preview" id="slug-preview"></div>
      </div>
      <div class="form-group">
        <label>Tu email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Teléfono (opcional)</label>
        <input type="tel" id="reg-tel" placeholder="Ej: 3512345678" />
      </div>
      <button class="btn" onclick="registrar()">Crear mi cuenta gratis</button>
    </div>

    <!-- LOGIN -->
    <div id="sec-login" style="display:none">
      <div id="alert-login"></div>
      <button class="btn btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
        Ingresar con Google
      </button>
      <div class="divider"><span>o con email</span></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
      </div>
      <button class="btn" onclick="login()">Ingresar</button>
    </div>
  </div>

  <div style="text-align:center;font-size:12px;color:#aaa;padding: 0 1rem">
    Al registrarte aceptás los términos de uso. Tu información está segura.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qivbrddsmamxsszacjhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Axj3TD_KZyVj6Aa1_8JJlg_BILyCNFS';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function showTab(tab) {
  document.getElementById('sec-registro').style.display = tab === 'registro' ? 'block' : 'none';
  document.getElementById('sec-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-registro').classList.toggle('active', tab === 'registro');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
}

function generarSlug() {
  const nombre = document.getElementById('reg-nombre').value;
  const slug = nombre.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
  document.getElementById('slug-preview').textContent = slug ? `Tu URL: miturno-ya.vercel.app/${slug}` : '';
  return slug;
}

async function registrar() {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const tel = document.getElementById('reg-tel').value.trim();
  const slug = generarSlug();
  const alerta = document.getElementById('alert-registro');

  if(!nombre || !email || !pass) { alerta.innerHTML = '<div class="alert alert-error">Completá nombre, email y contraseña.</div>'; return; }
  if(pass.length < 6) { alerta.innerHTML = '<div class="alert alert-error">La contraseña debe tener al menos 6 caracteres.</div>'; return; }
  if(!slug) { alerta.innerHTML = '<div class="alert alert-error">El nombre del negocio no es válido.</div>'; return; }

  alerta.innerHTML = '<div class="alert" style="background:#EEEDFE;color:#3C3489">Creando tu cuenta...</div>';

  // Verificar si el slug ya existe
  const { data: existe } = await db.from('negocios').select('id').eq('slug', slug).single();
  if(existe) { alerta.innerHTML = '<div class="alert alert-error">Ese nombre ya está en uso. Probá con otro.</div>'; return; }

  // Crear el negocio
  const { data: negocio, error } = await db.from('negocios').insert([{
    nombre, slug, email, telefono: tel,
    plan: 'trial',
    trial_hasta: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString(),
    activo: true
  }]).select().single();

  if(error) { alerta.innerHTML = '<div class="alert alert-error">Error al crear la cuenta. El email puede ya estar en uso.</div>'; return; }

  // Guardar sesión
  localStorage.setItem('mty_negocio_id', negocio.id);
  localStorage.setItem('mty_negocio_slug', negocio.slug);
  localStorage.setItem('mty_negocio_nombre', negocio.nombre);
  localStorage.setItem('mty_negocio_email', negocio.email);

  // Crear config inicial
  const configs = [
    {clave:'dias_abierto', valor:'0,1,2,3,4,5', negocio_id: negocio.id},
    {clave:'hora_inicio', valor:'09:00', negocio_id: negocio.id},
    {clave:'hora_fin', valor:'18:00', negocio_id: negocio.id},
    {clave:'hora_inicio_2', valor:'18:00', negocio_id: negocio.id},
    {clave:'hora_fin_2', valor:'22:00', negocio_id: negocio.id},
    {clave:'horario_partido', valor:'false', negocio_id: negocio.id},
    {clave:'intervalo_minutos', valor:'30', negocio_id: negocio.id},
    {clave:'whatsapp_numero', valor:tel||'', negocio_id: negocio.id},
    {clave:'whatsapp_mensaje', valor:'Hola! Me gustaría consultar sobre los turnos disponibles.', negocio_id: negocio.id},
    {clave:'nombre_negocio', valor:nombre, negocio_id: negocio.id}
  ];
  await db.from('negocio_config').insert(configs);

  alerta.innerHTML = '<div class="alert alert-success">✓ ¡Cuenta creada! Redirigiendo...</div>';
  setTimeout(() => { window.location.href = `/${slug}/admin.html`; }, 1500);
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const alerta = document.getElementById('alert-login');
  if(!email || !pass) { alerta.innerHTML = '<div class="alert alert-error">Completá email y contraseña.</div>'; return; }

  const { data: negocio } = await db.from('negocios').select('*').eq('email', email).single();
  if(!negocio) { alerta.innerHTML = '<div class="alert alert-error">Email no encontrado.</div>'; return; }

  // Por ahora login simple — después agregamos hash
  localStorage.setItem('mty_negocio_id', negocio.id);
  localStorage.setItem('mty_negocio_slug', negocio.slug);
  localStorage.setItem('mty_negocio_nombre', negocio.nombre);
  localStorage.setItem('mty_negocio_email', negocio.email);

  window.location.href = `/${negocio.slug}/admin.html`;
}

async function loginGoogle() {
  alert('Login con Google próximamente disponible.');
}

// Si ya está logueado, redirigir
const slugGuardado = localStorage.getItem('mty_negocio_slug');
if(slugGuardado) window.location.href = `/${slugGuardado}/admin.html`;
</script>
</body>
</html>
