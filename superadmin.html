<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiTurnoYa — Super Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f0f5; color: #1a1a1a; }
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.login-card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; text-align: center; }
.login-card h2 { font-size: 22px; font-weight: 800; color: #7F77DD; margin-bottom: 4px; }
.login-card p { font-size: 13px; color: #aaa; margin-bottom: 1.5rem; }
.form-group { margin-bottom: 14px; text-align: left; }
.form-group label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
.form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #eee; border-radius: 10px; font-size: 15px; background: #fafafa; color: #1a1a1a; }
.form-group input:focus { border-color: #7F77DD; outline: none; }
.btn { width: 100%; padding: 13px; background: #7F77DD; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn:hover { background: #534AB7; }
.btn-sm { width: auto; padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-green { background: #639922; color: white; border: none; cursor: pointer; }
.btn-green:hover { background: #3B6D11; }
.btn-danger { background: #E24B4A; color: white; border: none; cursor: pointer; }
.btn-danger:hover { background: #A32D2D; }
.btn-outline { background: transparent; border: 1.5px solid #7F77DD; color: #7F77DD; cursor: pointer; }
.alert { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; text-align: center; }
.alert-error { background: #FCEBEB; color: #501313; }

/* DASHBOARD */
.dashboard { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.top-bar h1 { font-size: 22px; font-weight: 800; }
.top-bar span { font-size: 13px; color: #aaa; }
.logout-btn { background: #f0f0f5; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 700; }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.metric { background: white; border-radius: 12px; padding: 1rem; }
.metric .label { font-size: 11px; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.metric .value { font-size: 32px; font-weight: 800; color: #333; margin-top: 4px; }
.metric .sub { font-size: 11px; margin-top: 2px; font-weight: 600; }
.sub-trial { color: #BA7517; }
.sub-activo { color: #639922; }
.sub-vencido { color: #E24B4A; }

/* FILTROS */
.filtros { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filtro-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1.5px solid #eee; background: white; cursor: pointer; color: #666; }
.filtro-btn.active { background: #7F77DD; color: white; border-color: #7F77DD; }

/* TABLA */
.tabla-container { background: white; border-radius: 12px; overflow: hidden; }
.tabla-header { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr 1fr; gap: 10px; padding: 12px 16px; background: #f8f8fc; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.negocio-row { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr 1fr; gap: 10px; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; align-items: center; }
.negocio-row:last-child { border-bottom: none; }
.negocio-row:hover { background: #fafafa; }
.negocio-nombre { font-size: 14px; font-weight: 700; }
.negocio-slug { font-size: 12px; color: #7F77DD; margin-top: 2px; }
.negocio-email { font-size: 13px; color: #555; }
.negocio-tel { font-size: 12px; color: #aaa; margin-top: 2px; }
.plan-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
.plan-trial { background: #FAEEDA; color: #633806; }
.plan-activo { background: #EAF3DE; color: #27500A; }
.plan-vencido { background: #FCEBEB; color: #A32D2D; }
.plan-pro { background: #EEEDFE; color: #3C3489; }
.dias-restantes { font-size: 12px; color: #aaa; margin-top: 2px; }
.acciones { display: flex; gap: 6px; flex-wrap: wrap; }
.empty-state { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }

/* MODAL */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: white; border-radius: 16px 16px 0 0; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
.modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 1rem; }

@media (max-width: 600px) {
  .tabla-header { display: none; }
  .negocio-row { grid-template-columns: 1fr; gap: 6px; }
  .metrics { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h2>🔐 Super Admin</h2>
    <p>Panel de gestión de MiTurnoYa</p>
    <div id="alert-login"></div>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com" /></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="top-bar">
    <div>
      <h1>📊 Super Admin</h1>
      <span id="admin-email"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Salir</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="label">Total negocios</div><div class="value" id="m-total">-</div><div class="sub">registrados</div></div>
    <div class="metric"><div class="label">En trial</div><div class="value" id="m-trial">-</div><div class="sub sub-trial">activos hoy</div></div>
    <div class="metric"><div class="label">Pagos activos</div><div class="value" id="m-activos">-</div><div class="sub sub-activo">pagando</div></div>
    <div class="metric"><div class="label">Vencidos</div><div class="value" id="m-vencidos">-</div><div class="sub sub-vencido">a contactar</div></div>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" onclick="filtrar('todos', this)">Todos</button>
    <button class="filtro-btn" onclick="filtrar('trial', this)">En trial</button>
    <button class="filtro-btn" onclick="filtrar('pro', this)">Pagando</button>
    <button class="filtro-btn" onclick="filtrar('vencido', this)">Vencidos</button>
  </div>

  <div class="tabla-container">
    <div class="tabla-header">
      <div>Negocio</div>
      <div>Contacto</div>
      <div>Plan</div>
      <div>Trial hasta</div>
      <div>Acciones</div>
    </div>
    <div id="lista-negocios"><div class="empty-state">Cargando...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qivbrddsmamxsszacjhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Axj3TD_KZyVj6Aa1_8JJlg_BILyCNFS';
const SUPER_PASS = 'superadmin2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let todosNegocios = [];
let adminEmail = '';

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const alerta = document.getElementById('alert-login');

  if(!email || !pass) { alerta.innerHTML = '<div class="alert alert-error">Completá los campos.</div>'; return; }
  if(pass !== SUPER_PASS) { alerta.innerHTML = '<div class="alert alert-error">Contraseña incorrecta.</div>'; return; }

  const { data } = await db.from('super_admins').select('*').eq('email', email).single();
  if(!data) { alerta.innerHTML = '<div class="alert alert-error">No tenés acceso de super admin.</div>'; return; }

  adminEmail = email;
  sessionStorage.setItem('sa_email', email);
  mostrarDashboard();
}

function doLogout() {
  sessionStorage.removeItem('sa_email');
  location.reload();
}

async function mostrarDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('admin-email').textContent = adminEmail;
  await cargarNegocios();
}

async function cargarNegocios() {
  const { data } = await db.from('negocios').select('*').order('created_at', { ascending: false });
  todosNegocios = data || [];
  actualizarMetricas();
  renderNegocios(todosNegocios);
}

function actualizarMetricas() {
  const hoy = new Date();
  const trial = todosNegocios.filter(n => n.plan === 'trial' && new Date(n.trial_hasta) > hoy);
  const activos = todosNegocios.filter(n => n.plan === 'pro');
  const vencidos = todosNegocios.filter(n => n.plan === 'trial' && new Date(n.trial_hasta) <= hoy);
  document.getElementById('m-total').textContent = todosNegocios.length;
  document.getElementById('m-trial').textContent = trial.length;
  document.getElementById('m-activos').textContent = activos.length;
  document.getElementById('m-vencidos').textContent = vencidos.length;
}

function filtrar(tipo, el) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const hoy = new Date();
  let lista = todosNegocios;
  if(tipo === 'trial') lista = todosNegocios.filter(n => n.plan === 'trial' && new Date(n.trial_hasta) > hoy);
  if(tipo === 'pro') lista = todosNegocios.filter(n => n.plan === 'pro');
  if(tipo === 'vencido') lista = todosNegocios.filter(n => n.plan === 'trial' && new Date(n.trial_hasta) <= hoy);
  renderNegocios(lista);
}

function renderNegocios(lista) {
  const cont = document.getElementById('lista-negocios');
  if(!lista.length) { cont.innerHTML = '<div class="empty-state">No hay negocios en esta categoría</div>'; return; }
  const hoy = new Date();
  cont.innerHTML = lista.map(n => {
    const trialHasta = new Date(n.trial_hasta);
    const vencido = n.plan === 'trial' && trialHasta <= hoy;
    const diasRestantes = Math.ceil((trialHasta - hoy) / (1000*60*60*24));
    let planClass = 'plan-trial', planLabel = 'Trial';
    if(n.plan === 'pro') { planClass = 'plan-activo plan-pro'; planLabel = 'Pro ✓'; }
    else if(vencido) { planClass = 'plan-vencido'; planLabel = 'Vencido'; }
    const waMsg = encodeURIComponent(`Hola ${n.nombre}! Te escribo desde MiTurnoYa. ¿Cómo va todo con la plataforma?`);
    const waUrl = n.telefono ? `https://wa.me/549${n.telefono}?text=${waMsg}` : '#';
    return `<div class="negocio-row">
      <div>
        <div class="negocio-nombre">${n.nombre}</div>
        <div class="negocio-slug">/${n.slug}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">${new Date(n.created_at).toLocaleDateString('es-AR')}</div>
      </div>
      <div>
        <div class="negocio-email">${n.email}</div>
        <div class="negocio-tel">${n.telefono ? '📱 '+n.telefono : 'Sin teléfono'}</div>
      </div>
      <div><span class="plan-badge ${planClass}">${planLabel}</span></div>
      <div>
        <div style="font-size:13px;font-weight:700">${trialHasta.toLocaleDateString('es-AR')}</div>
        <div class="dias-restantes">${vencido ? '⚠️ Vencido' : diasRestantes > 0 ? diasRestantes+' días' : 'Hoy vence'}</div>
      </div>
      <div class="acciones">
        ${n.telefono ? `<a href="${waUrl}" target="_blank"><button class="btn btn-sm btn-green">💬 WA</button></a>` : ''}
        ${n.plan !== 'pro' ? `<button class="btn btn-sm btn-outline" onclick="activarPro('${n.id}')">Activar Pro</button>` : `<button class="btn btn-sm btn-danger" onclick="desactivar('${n.id}')">Desactivar</button>`}
        <a href="/negocio-admin.html" onclick="verComoNegocio('${n.id}','${n.slug}','${n.nombre}','${n.email}')" target="_blank"><button class="btn btn-sm" style="background:#f0f0f5;color:#333;border:none;cursor:pointer">Ver panel</button></a>
      </div>
    </div>`;
  }).join('');
}

async function activarPro(id) {
  if(!confirm('¿Activar plan Pro para este negocio?')) return;
  await db.from('negocios').update({ plan: 'pro', activo: true }).eq('id', id);
  await cargarNegocios();
}

async function desactivar(id) {
  if(!confirm('¿Desactivar este negocio?')) return;
  await db.from('negocios').update({ plan: 'trial', trial_hasta: new Date().toISOString() }).eq('id', id);
  await cargarNegocios();
}

function verComoNegocio(id, slug, nombre, email) {
  localStorage.setItem('mty_negocio_id', id);
  localStorage.setItem('mty_negocio_slug', slug);
  localStorage.setItem('mty_negocio_nombre', nombre);
  localStorage.setItem('mty_negocio_email', email);
}

// Auto login si ya hay sesión
const saEmail = sessionStorage.getItem('sa_email');
if(saEmail) { adminEmail = saEmail; mostrarDashboard(); }
</script>
</body>
</html>
